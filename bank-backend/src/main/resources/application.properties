# Mailhog SMTP config
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:noreply@bankingapp.com}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false


# Frontend
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}

# Logging
logging.level.org.springframework.security=${LOG_SECURITY_LEVEL:INFO}
logging.level.com.bank.bankbackend=${LOG_APP_LEVEL:INFO}
