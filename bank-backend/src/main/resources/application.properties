# Server
server.port=${SERVER_PORT:8080}
spring.application.name=${SPRING_APPLICATION_NAME:bank-backend}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Mail
#spring.mail.host=${MAIL_HOST}
#spring.mail.port=${MAIL_PORT}
#spring.mail.username=${MAIL_USERNAME}
#spring.mail.password=${MAIL_PASSWORD}
#
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true
#spring.mail.properties.mail.smtp.starttls.required=true

# Mailhog SMTP config
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
app.mail.from=noreply@bankingapp.com
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false


# Frontend
app.frontend.url=${APP_FRONTEND_URL}

# Logging
logging.level.org.springframework.security=${LOG_SECURITY_LEVEL:INFO}
logging.level.com.bank.bankbackend=${LOG_APP_LEVEL:INFO}
