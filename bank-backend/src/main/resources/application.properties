# Server
server.port=${PORT:${SERVER_PORT:8080}}
spring.application.name=${SPRING_APPLICATION_NAME:bank-backend}

# Database
spring.datasource.url=${DB_URL:jdbc:h2:mem:bankappdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:7200}

# Mail
#spring.mail.host=${MAIL_HOST}
