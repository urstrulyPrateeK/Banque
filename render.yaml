services:
  - type: web
    name: banque
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_APPLICATION_NAME
        value: Banque
      - key: APP_FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: GCP_ENABLED
        value: false
      - key: GCP_PROJECT_ID
        value: banque-project-id
      - key: GCP_STORAGE_BUCKET
        value: banque-documents
