<header class="app-header">
    <div class="header-left">
        <span class="eyebrow">Scalable &amp; reliable</span>
        <div class="title-stack">
            <h1 class="page-title">Operations center</h1>
            <p>Cross-functional banking workflows across accounts, transfers, payments, and compliance evidence.</p>
        </div>
    </div>

    <div class="header-right">
        <button class="header-btn notification-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span class="notification-badge">3</span>
        </button>

        <div class="user-menu">
            <button class="user-menu-btn" (click)="navigateToProfile()">
                <div class="user-avatar">{{ authStore.userInitials() }}</div>
                <div class="user-copy">
                    <span class="user-name">{{ authStore.fullName() || 'Banque user' }}</span>
                    <small>{{ authStore.userEmail() || 'secured workspace' }}</small>
                </div>
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <button class="header-btn logout-btn" (click)="logout()" aria-label="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </div>
</header>
