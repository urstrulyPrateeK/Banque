<div class="login-container">
  <div class="login-card">
    <!-- Logo & Title -->
    <div class="login-header">
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3" />
        </svg>
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to access your account</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Username Field -->
      <div class="form-group">
        <label for="username" class="form-label">
          Username
          <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" />
          </svg>
          <input id="username" type="text" formControlName="username" class="form-input"
            placeholder="Enter your username" [class.error]="getFieldError('username')" autocomplete="username" />
        </div>
        @if (getFieldError('username'); as error) {
        <span class="error-message">{{ error }}</span>
        }
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">
          Password
          <span class="required">*</span>
        </label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
              clip-rule="evenodd" />
          </svg>
          <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
            class="form-input" placeholder="Enter your password" [class.error]="getFieldError('password')"
            autocomplete="current-password" />
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
            @if (showPassword()) {
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
              <path fill-rule="evenodd"
                d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                clip-rule="evenodd" />
            </svg>
            } @else {
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z"
                clip-rule="evenodd" />
              <path
                d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z" />
            </svg>
            }
          </button>
        </div>
        @if (getFieldError('password'); as error) {
        <span class="error-message">{{ error }}</span>
        }
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Remember me</span>
        </label>
        <a routerLink="/auth/forgot-password" class="forgot-password">
          Forgot password?
        </a>
      </div>

      <!-- Error Message -->
      @if (authStore.error(); as error) {
      <div class="alert alert-error" role="alert">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd" />
        </svg>
        <span>{{ error }}</span>
      </div>
      }

      <!-- Submit Button -->
      <button type="submit" class="submit-button" [class.loading]="authStore.isLoading()">
        @if (authStore.isLoading()) {
        <span class="spinner"></span>
        <span>Signing in...</span>
        } @else {
        <span>Sign In</span>
        }
      </button>
    </form>

    <!-- Register Link -->
    <div class="register-link">
      <p>Don't have an account?</p>
      <a routerLink="/auth/register">Create Account</a>
    </div>
  </div>

  <!-- Decorative Elements -->
  <div class="background-pattern"></div>
</div>
