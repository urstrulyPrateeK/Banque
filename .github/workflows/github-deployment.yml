name: Publish GitHub Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  publish-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Create deployment record
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              task: 'deploy',
              auto_merge: false,
              required_contexts: [],
              environment: 'production',
              description: 'Banque live deployment on Render',
              transient_environment: false,
              production_environment: true
            });

            core.setOutput('deployment_id', deployment.data.id.toString());

      - name: Mark deployment as live
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state: 'success',
              environment: 'production',
              environment_url: 'https://banque-p7oe.onrender.com/',
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Live on Render'
            });